<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Filmy Charades</title>
    <style>
        body { font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: linear-gradient(135deg, #f0f648 0%, #e52a78 100%); color: #333; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 450px; }
        h1 { color: #764ba2; margin-top: 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }
        #word-display { font-size: 2.2rem; font-weight: 800; min-height: 120px; display: flex; align-items: center; justify-content: center; color: #222; margin: 1.5rem 0; border: 4px solid #f0f2f5; border-radius: 15px; background-color: #fafafa; transition: all 0.3s ease; line-height: 1.2; padding: 10px; }
        .highlight { animation: pop 0.4s ease-out; color: #e91e63 !important; }
        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
        button { background: #764ba2; color: white; border: none; padding: 18px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.2s; width: 100%; box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3); }
        button:hover { background: #5a3782; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        #stats { margin-top: 20px; font-weight: bold; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h1>Who am I?</h1>
    <div id="word-display">Ready for the Show?</div>
    <button id="next-btn" onclick="showNextWord()">REVEAL NEXT WORD</button>
    <div id="stats">Remaining: <span id="count">80</span> / 80</div>
</div>

<script>
    const words = [
        "Sholay", "Hera Pheri", "Pushpa", "Dilwale Dulhania Le Jayenge", "Bahubali",
        "Mogambo", "3 Idiots", "Gabbar Singh", "Munna Bhai M.B.B.S.", "Gadar",
        "Bhool Bhulaiyaa", "Singham", "Koi... Mil Gaya", "Lagaan", "K.G.F",
        "Kabhi Khushi Kabhie Gham", "Kuch Kuch Hota Hai", "Kabir Singh", "Bajirao Mastani", "Don",
        "Chulbul Pandey", "Shaktimaan", "Andaz Apna Apna", "Gully Boy", "Barfi!",
        "Drishyam", "Stree", "Kantara", "PK", "Robot (Chitti)",
        "Dangal", "Zindagi Na Milegi Dobara", "Queen", "Bhaag Milkha Bhaag", "Welcome",
        "Om Shanti Om", "Chennai Express", "Jab We Met", "Golmaal", "Agneepath",
        "Sanjay Dutt (Vaastav)", "Rajinikanth", "Crime Master Gogo", "Chachi 420", "Taare Zameen Par","Gajini","Border", "Devdas", "Hum Aapke Hain Koun..!", "Tiger Zinda Hai", "Main Hoon Na", "Narendra Modi", "Virat Kohli", "MS Dhoni", "Ratan Tata", "Mukesh Ambani", "Baba Ramdev (Yoga)", "Sonu Nigam", "Mithun Chakraborty (Disco Dancer)", "Salman Khan (Towel dance)", "Alia Bhatt", "Auto Rickshaw Driver", "Cyclewala", "Dabbawala", "Tea Seller", "Rickshaw Puller", "Vegetable Vendor", "Street Magician", "Fortune Teller", "Ice Cream Vendor", "Flying a Kite", "Making a Round Roti", "Taking a Selfie", "Snake Dance (Nagin Dance)", "Jethalal Gada", "Popatlal", "Bhide", "Madhavi",
    ];

    let remainingWords = [...words];

    function showNextWord() {
        const display = document.getElementById('word-display');
        
        if (remainingWords.length === 0) {
            display.innerText = "The End! 🍿";
            display.classList.remove('highlight');
            document.getElementById('next-btn').disabled = true;
            return;
        }

        const randomIndex = Math.floor(Math.random() * remainingWords.length);
        const selectedWord = remainingWords.splice(randomIndex, 1)[0];
        
        display.innerText = selectedWord;
        display.classList.remove('highlight');
        void display.offsetWidth; 
        display.classList.add('highlight');

        document.getElementById('count').innerText = remainingWords.length;
    }
</script>

</body>
</html>
